{% extends "base.html" %}

{% block title %}Server Error - {{ app_name }}{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-gray-200 dark:text-gray-700">500</h1>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mt-4">Server Error</h2>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Something went wrong. Please try again later.</p>
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center mt-6 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg transition-colors">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
