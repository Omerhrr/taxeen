# Taxeen Nginx Configuration
# Production-ready reverse proxy with SSL, rate limiting, and caching

# ============================================
# Worker Configuration
# ============================================
worker_processes auto;
worker_rlimit_nofile 65535;

# ============================================
# Error and PID Configuration
# ============================================
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ============================================
# Events Configuration
# ============================================
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ============================================
# HTTP Configuration
# ============================================
http {
    # Basic Settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    server_tokens off;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Buffer sizes
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 50M;
    large_client_header_buffers 4 8k;
    
    # ============================================
    # Rate Limiting Zones
    # ============================================
    # General API rate limit: 10 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Login/Auth rate limit: 5 requests per second (stricter)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    
    # Upload rate limit: 2 requests per second
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
    
    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # Rate limit status
    limit_req_status 429;
    limit_conn_status 429;
    
    # ============================================
    # Upstream Servers
    # ============================================
    upstream backend {
        server backend:8000;
        keepalive 32;
    }
    
    upstream frontend1 {
        server frontend1:5000;
        keepalive 16;
    }
    
    # ============================================
    # Map for Rate Limiting Bypass (whitelist)
    # ============================================
    map $remote_addr $limit_key {
        default $binary_remote_addr;
        # Add whitelisted IPs here
        # 10.0.0.1 "";
        # 192.168.1.0/24 "";
    }
    
    # ============================================
    # SSL Configuration (shared)
    # ============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;
    
    # ============================================
    # HTTP Server - Redirect to HTTPS
    # ============================================
    server {
        listen 80;
        listen [::]:80;
        server_name taxeen.com www.taxeen.com localhost;
        
        # Allow Let's Encrypt challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    # ============================================
    # HTTPS Server - Main Application
    # ============================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name taxeen.com www.taxeen.com localhost;
        
        # SSL Certificate Paths (update with actual certificates)
        ssl_certificate /etc/nginx/ssl/taxeen.crt;
        ssl_certificate_key /etc/nginx/ssl/taxeen.key;
        
        # Security Headers (HTTPS specific)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' api.taxeen.com; frame-ancestors 'self';" always;
        
        # Connection limit
        limit_conn conn_limit 100;
        
        # ============================================
        # Health Check Endpoint
        # ============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # ============================================
        # Backend API Proxy
        # ============================================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # Connection headers
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Disable caching for API
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        
        # ============================================
        # Auth Endpoints (Stricter Rate Limiting)
        # ============================================
        location /api/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /api/auth/register {
            limit_req zone=auth_limit burst=5 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ============================================
        # Upload Endpoints (Special Handling)
        # ============================================
        location /api/uploads/ {
            limit_req zone=upload_limit burst=3 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increased timeout for uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
        
        # ============================================
        # API Documentation (Optional - disable in prod)
        # ============================================
        location ~ ^/(docs|redoc|openapi.json) {
            # Uncomment to disable documentation in production
            # return 404;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ============================================
        # Static Files (Frontend)
        # ============================================
        location /static/ {
            alias /var/www/static/;
            
            # Caching
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            
            # Compression
            gzip_static on;
        }
        
        # ============================================
        # Frontend Proxy (All other requests)
        # ============================================
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://frontend1;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # ============================================
        # Error Pages
        # ============================================
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /var/www/html;
            internal;
        }
        
        # ============================================
        # Deny Access to Hidden Files
        # ============================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Deny access to sensitive files
        location ~* \.(env|git|gitignore|dockerignore)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
