version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: taxeen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taxeen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxeen_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-taxeen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxeen} -d ${POSTGRES_DB:-taxeen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxeen_network

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: taxeen_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-taxeen_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-taxeen_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxeen_network

  # FastAPI Backend Service
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: taxeen_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxeen}:${POSTGRES_PASSWORD:-taxeen_secure_password}@postgres:5432/${POSTGRES_DB:-taxeen}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-taxeen_redis_password}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-32-byte-encryption-key-here}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,https://taxeen.com}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - taxeen_network

  # Flask Frontend Service
  frontend1:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend1
    container_name: taxeen_frontend1
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8000
      - SECRET_KEY=${FLASK_SECRET_KEY:-your-flask-secret-key-change-in-production}
      - SESSION_TYPE=${SESSION_TYPE:-redis}
      - SESSION_REDIS=redis://:${REDIS_PASSWORD:-taxeen_redis_password}@redis:6379/1
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - frontend_logs:/app/logs
    expose:
      - "5000"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - taxeen_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: taxeen_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - frontend_static:/var/www/static:ro
    depends_on:
      - backend
      - frontend1
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - taxeen_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  frontend_logs:
    driver: local
  frontend_static:
    driver: local
  nginx_logs:
    driver: local

networks:
  taxeen_network:
    driver: bridge
