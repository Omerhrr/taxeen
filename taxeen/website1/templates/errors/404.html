{% extends "base.html" %}

{% block title %}Page Not Found - {{ app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 pt-20">
    <div class="text-center px-4">
        <h1 class="text-9xl font-bold text-emerald-600">404</h1>
        <h2 class="text-3xl font-bold text-gray-900 mt-4 mb-2">Page Not Found</h2>
        <p class="text-gray-600 mb-8">Sorry, the page you're looking for doesn't exist or has been moved.</p>
        <div class="flex gap-4 justify-center">
            <a href="{{ url_for('index') }}" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg transition-colors">
                Go Home
            </a>
            <a href="{{ url_for('contact') }}" class="px-6 py-3 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition-colors">
                Contact Support
            </a>
        </div>
    </div>
</div>
{% endblock %}
